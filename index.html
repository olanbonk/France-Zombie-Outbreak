<!DOCTYPE html>
<html style="height: 100%; margin: 0;">
<head>
    <title>France Apocalypse: Master Command</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <style>
        body { height: 100%; margin: 0; font-family: 'Courier New', monospace; background: #000; color: #0f0; display: flex; flex-direction: column; }
        #map { flex: 1; width: 100%; background: #111; border-bottom: 2px solid #0f0; }
        .dashboard { height: 280px; padding: 15px; display: flex; gap: 15px; background: #0a0a0a; border-top: 1px solid #0f0; overflow-y: auto; }
        .tool-box { border: 1px solid #0f0; padding: 12px; background: #000; min-width: 220px; flex: 1; font-size: 0.85em; }
        h3 { margin: 0 0 10px 0; color: #0f0; font-size: 0.9em; text-transform: uppercase; border-bottom: 1px solid #0f0; padding-bottom: 3px; }
        button { cursor: pointer; background: #000; color: #0f0; border: 1px solid #0f0; padding: 5px 8px; margin: 2px; font-family: 'Courier New', monospace; font-size: 0.8em; }
        button:hover { background: #0f0; color: #000; }
        select, textarea { background: #000; color: #0f0; border: 1px solid #0f0; padding: 4px; width: 100%; margin-bottom: 8px; }
        .status-bar { position: absolute; top: 10px; right: 10px; z-index: 1001; background: rgba(0,0,0,0.9); padding: 10px; border: 1px solid #0f0; }
        .admin-only { display: none; }
        .hint { color: #888; font-size: 0.75em; margin-top: 5px; }
        #resizer {
        height: 8px;
        background: #0f0;
        cursor: ns-resize; /* North-South resize cursor */
        width: 100%;
        z-index: 1002;
}
    </style>
</head>
<body>

<div class="status-bar">
    <span id="user-type">SIGNAL: ENCRYPTED</span> 
    <button onclick="login()">AUTH_ADMIN</button>
</div>

<div id="map"></div>
<div id="resizer"></div> <div class="dashboard" id="dashboard">

<div id="map"></div>

<div class="dashboard">
    <div class="tool-box admin-only">
        <h3>1. Geometry Config</h3>
        <label>Polygon Zone Type:</label>
        <select id="zone-style">
            <option value="black">Ruin (Black)</option>
            <option value="purple">Infected (Purple)</option>
            <option value="yellow">Quarantine (Yellow)</option>
            <option value="green">Safe Zone (Green)</option>
        </select>
        <label>Line/Route Style:</label>
        <select id="route-style">
            <option value="cyan">Supply Route (Cyan)</option>
            <option value="red">Frontline (Red)</option>
            <option value="white">Civic Path (White)</option>
        </select>
    </div>

    <div class="tool-box admin-only">
        <h3>2. Intel Markers</h3>
        <label>Active Unit/Site:</label>
        <select id="marker-icon">
            <option value="📍">Standard Pin</option>
            <option value="🏠">Outpost/Base</option>
            <option value="🚁">Helipad/Airfield</option>
            <option value="⚓">Sea Port</option>
            <option value="☢️">Nuclear Facility</option>
            <option value="🏥">Medical/Research</option>
            <option value="🛡️">Fortified Wall</option>
        </select>
        <div class="hint">Select icon before placing marker.</div>
    </div>

    <div class="tool-box admin-only">
        <h3>3. Data/Memory</h3>
        <button onclick="saveToBrowser()">💾 LOCAL SAVE</button>
        <button onclick="exportData()">📋 COPY BACKUP</button>
        <textarea id="import-area" placeholder="Paste data here..." rows="1"></textarea>
        <button onclick="importData()">📥 LOAD STRING</button>
        <div class="hint">Use Ctrl+Z to undo last placement.</div>
    </div>

    <div class="tool-box">
        <h3>Field Suggestions</h3>
        <div id="pending-list">No incoming intel...</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
    let map, drawnItems, isAdmin = false;
    const history = [];

    window.onload = function() {
        // Core Map Setup
        map = L.map('map').setView([46.2276, 2.2137], 6);

        // Bright, Clear Political Map (Original Version)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
    }).addTo(map);

// This ensures the map fills the space correctly after loading
setTimeout(() => { map.invalidateSize(); }, 200);;

        drawnItems = new L.FeatureGroup().addTo(map);

        const drawControl = new L.Control.Draw({
            edit: { featureGroup: drawnItems },
            draw: { circle: false, circlemarker: false, rectangle: true }
        });

        window.login = function() {
            if(prompt("PASSWORD:") === "iloveusingnuclearweapons") {
                isAdmin = true;
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                document.getElementById('user-type').innerText = "SIGNAL: ADMIN_ROOT";
                map.addControl(drawControl);
                loadFromBrowser();
            }
        };

        map.on(L.Draw.Event.CREATED, function (e) {
            const label = prompt("Site Name/Description:");
            if (!label) return;
            const layer = e.layer;

            if (isAdmin) {
                applyApocStyles(layer, e.layerType, label);
                layer.addTo(drawnItems);
                history.push(layer);
            } else {
                layer.setStyle({color: 'orange', dashArray: '8,8'}).addTo(map);
                alert("Intel Suggestion Uploaded to Command.");
            }
        });

        function applyApocStyles(layer, type, label) {
            if (type === 'marker') {
                const icon = document.getElementById('marker-icon').value;
                layer.setIcon(L.divIcon({html: `<div style="font-size:24px; filter:drop-shadow(0 0 2px #000);">${icon}</div>`, className: 'icon', iconSize:[30,30]}));
            } else if (type === 'polyline') {
                const color = document.getElementById('route-style').value;
                layer.setStyle({color: color, weight: 6, opacity: 0.8});
            } else {
                const color = document.getElementById('zone-style').value;
                layer.setStyle({color: color, fillColor: color, fillOpacity: 0.4, weight: 2});
            }
            
            const popupContent = `<div><b>${label}</b><br><button onclick="const n=prompt('New Name:'); if(n) this.parentElement.querySelector('b').innerText=n;">RENAME</button></div>`;
            layer.bindPopup(popupContent);
        }

        

        // CTRL + Z
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'z' && history.length > 0) {
                const last = history.pop();
                drawnItems.removeLayer(last);
            }
        });
    };

    // Data Systems
    window.saveToBrowser = () => { localStorage.setItem('apoc_save_v4', JSON.stringify(drawnItems.toGeoJSON())); alert("Browser Cache Updated."); };
    window.exportData = () => { navigator.clipboard.writeText(JSON.stringify(drawnItems.toGeoJSON())); alert("Backup String Copied to Clipboard."); };
    window.importData = () => { 
        const str = document.getElementById('import-area').value; 
        if (str) { 
            const json = JSON.parse(str);
            L.geoJSON(json, {
                onEachFeature: (f, l) => {
                    l.bindPopup(`<b>${f.properties.name || 'Site'}</b>`);
                    l.addTo(drawnItems);
                }
            });
            alert("External Data Injected.");
        } 
    };
    function loadFromBrowser() {
        const saved = localStorage.getItem('apoc_save_v4');
        if (saved) {
            L.geoJSON(JSON.parse(saved), { onEachFeature: (f, l) => { l.bindPopup(`<b>${f.properties.name || 'Site'}</b>`); l.addTo(drawnItems); } });
        }
    }

    const resizer = document.getElementById('resizer');
    const dashboard = document.getElementById('dashboard');
    let isResizing = false;

    resizer.addEventListener('mousedown', (e) => {
        isResizing = true;
        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseup', () => isResizing = false);
    });

    function handleMouseMove(e) {
        if (!isResizing) return;
        const newHeight = window.innerHeight - e.clientY;
        if (newHeight > 50 && newHeight < window.innerHeight * 0.8) {
        dashboard.style.height = newHeight + 'px';

    function handleMouseMove(e) {
    if (!isResizing) return;
    
    // Calculate new height
    const newHeight = window.innerHeight - e.clientY;
    
    // Set limits so you don't accidentally hide the whole map
    if (newHeight > 50 && newHeight < window.innerHeight * 0.9) {
        dashboard.style.height = newHeight + 'px';
        
        // CRUCIAL: Tell the map to refresh its internal dimensions
        if (map) {
            map.invalidateSize();
        }
    }
}
    }
}
</script>
</body>
</html>
