function handleMouseMove(e) {

    // ── COLOR PICKER SYSTEM ──────────────────────────────────────────
window.selectedMapColor = '#ff0000';
let pickerLightness = 50;
let savedColors = JSON.parse(localStorage.getItem('apoc_saved_colors') || '[]');

function togglePicker() {
    const panel = document.getElementById('picker-panel');
    const open = panel.style.display === 'none';
    panel.style.display = open ? 'block' : 'none';
    if (open) drawColorWheel();

function setActiveColor(hex) {
    window.selectedMapColor = hex;
    document.getElementById('color-preview').style.background = hex;
    document.getElementById('hex-input').value = hex;
}

function onHexType(val) {
    if (/^#[0-9a-fA-F]{6}$/.test(val)) setActiveColor(val);
}

function onLightnessChange(val) {
    pickerLightness = parseInt(val);
    drawColorWheel();
}

function drawColorWheel() {
    const canvas = document.getElementById('color-wheel');
    const ctx = canvas.getContext('2d');
    const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 2;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let angle = 0; angle < 360; angle++) {
        const startAngle = (angle - 1) * Math.PI / 180;
        const endAngle = (angle + 1) * Math.PI / 180;
        for (let sat = 0; sat <= 100; sat += 2) {
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
            grad.addColorStop(sat / 100, `hsl(${angle},${sat}%,${pickerLightness}%)`);
            grad.addColorStop(1, `hsl(${angle},${sat}%,${pickerLightness}%)`);
        }
        // Draw as sector slices
        const gradient = ctx.createLinearGradient(
            cx + Math.cos(startAngle) * r, cy + Math.sin(startAngle) * r,
            cx, cy
        );
        gradient.addColorStop(0, `hsl(${angle},100%,${pickerLightness}%)`);
        gradient.addColorStop(1, `hsl(${angle},0%,${pickerLightness}%)`);
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = gradient;
        ctx.fill();
    }
}

document.addEventListener('click', function(e) {
    const canvas = document.getElementById('color-wheel');
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    if (e.target !== canvas) return;
    const x = e.clientX - rect.left - canvas.width / 2;
    const y = e.clientY - rect.top - canvas.height / 2;
    const r = canvas.width / 2 - 2;
    const dist = Math.sqrt(x*x + y*y);
    if (dist > r) return;
    const angle = ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
    const sat = Math.min(100, (dist / r) * 100);
    const hsl = `hsl(${angle},${sat}%,${pickerLightness}%)`;
    // Convert HSL to hex
    const tmp = document.createElement('div');
    tmp.style.color = hsl;
    document.body.appendChild(tmp);
    const rgb = getComputedStyle(tmp).color;
    document.body.removeChild(tmp);
    const hex = rgbToHex(rgb);
    setActiveColor(hex);
});

function rgbToHex(rgb) {
    const m = rgb.match(/\d+/g);
    if (!m) return '#ff0000';
    return '#' + m.slice(0,3).map(n => parseInt(n).toString(16).padStart(2,'0')).join('');
}

// Eyedropper
async function launchEyedropper() {
    if (!window.EyeDropper) {
        alert("Eyedropper not supported in this browser. Use Chrome 95+.");
        return;
    }
    try {
        const dropper = new EyeDropper();
        const result = await dropper.open();
        setActiveColor(result.sRGBHex);
    } catch(e) { /* user cancelled */ }
}

// Show eyedropper btn only if supported
window.addEventListener('load', () => {
    if (!window.EyeDropper) {
        const btn = document.getElementById('eyedropper-btn');
        if (btn) btn.style.display = 'none';
    }
    renderSavedSwatches();
});

// Saved colors
function saveCurrentColor() {
    const c = window.selectedMapColor;
    if (!savedColors.includes(c)) {
        savedColors.unshift(c);
        if (savedColors.length > 20) savedColors.pop();
        localStorage.setItem('apoc_saved_colors', JSON.stringify(savedColors));
        renderSavedSwatches();
    }
}

function renderSavedSwatches() {
    const container = document.getElementById('saved-swatches');
    if (!container) return;
    container.innerHTML = '';
    savedColors.forEach(hex => {
        const s = document.createElement('div');
        s.title = hex;
        s.style.cssText = `width:18px;height:18px;background:${hex};border:1px solid #0f0;cursor:pointer;flex-shrink:0;`;
        s.onclick = () => setActiveColor(hex);
        // Right click to delete
        s.oncontextmenu = (e) => {
            e.preventDefault();
            savedColors = savedColors.filter(c => c !== hex);
            localStorage.setItem('apoc_saved_colors', JSON.stringify(savedColors));
            renderSavedSwatches();
        };
        container.appendChild(s);
    });
    if (savedColors.length === 0) container.innerHTML = '<span style="color:#555;font-size:0.75em;">None saved yet</span>';
}
